name: Security — SAST Semgrep containerisé

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:

  semgrep-code:
    name: Semgrep — code applicatif
    runs-on: [self-hosted, linux, iris, semgrep, docker]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Semgrep scan code (OWASP + secrets + custom)
        run: |
          docker run --rm \
            --volumes-from "$(hostname)" \
            -w "${{ github.workspace }}" \
            returntocorp/semgrep:latest \
            semgrep scan \
              --config=p/owasp-top-ten \
              --config=p/secrets \
              --config=.semgrep/rules/ \
              --json --output=semgrep-code.json \
              --error

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-code-${{ github.run_id }}
          path: 'semgrep-code.json'
          retention-days: 30

  semgrep-compose:
    name: Semgrep — Dockerfile & compose
    runs-on: [self-hosted, linux, iris, semgrep, docker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan conteneurs
        run: |
          docker run --rm \
            --volumes-from "$(hostname)" \
            -w "${{ github.workspace }}" \
            returntocorp/semgrep:latest \
            semgrep scan \
              --config=p/dockerfile \
              --config=p/docker-compose \
              --config=.semgrep/rules/containers/ \
              --json --output=semgrep-containers.json \
              --error

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-containers-${{ github.run_id }}
          path: 'semgrep-containers.json'

  audit-report:
    name: Audit Markdown
    needs: [semgrep-code, semgrep-compose]
    if: always()
    runs-on: [self-hosted, linux, iris, docker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { pattern: 'semgrep-*', merge-multiple: true }
      - name: Build audit
        run: |
          docker run --rm \
            --volumes-from "$(hostname)" \
            -w "${{ github.workspace }}" \
            python:3.12-alpine \
            python3 .github/scripts/semgrep_to_md.py semgrep-code.json semgrep-containers.json \
            > "${{ github.workspace }}/audit-semgrep.md"
      - uses: actions/upload-artifact@v4
        with:
          name: audit-semgrep-${{ github.run_id }}
          path: audit-semgrep.md
          retention-days: 30
